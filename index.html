<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2196F3">
    <title>Калькулятор натяжных потолков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .room-card {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-success {
            background: #4CAF50;
        }

        .btn-warning {
            background: #FF9800;
        }

        .summary {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
        }

        .total {
            font-size: 24px;
            font-weight: bold;
            color: #2196F3;
            text-align: center;
            margin: 20px 0;
        }

        .discount {
            background: #fff3e0;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 4px;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .price {
            color: #4CAF50;
            font-weight: bold;
        }

        .option-btn {
            background: #e0e0e0;
            color: #333;
            margin: 5px;
            padding: 10px;
        }

        .option-btn.selected {
            background: #2196F3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 Калькулятор натяжных потолков</h1>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Шаг 1: Комнаты -->
        <div id="step1" class="step active">
            <div class="card">
                <h2>🏠 Комнаты</h2>
                <div id="roomsList"></div>
                <button onclick="addRoom()">➕ Добавить комнату</button>
                <button class="btn-success" onclick="nextStep()">Далее →</button>
            </div>
        </div>

        <!-- Шаг 2: Профили -->
        <div id="step2" class="step">
            <div class="card">
                <h2>📐 Профили/багеты</h2>
                <div id="profilesList"></div>
                <button onclick="addProfile()">➕ Добавить профиль</button>
                <button onclick="prevStep()">← Назад</button>
                <button class="btn-success" onclick="nextStep()">Далее →</button>
            </div>
        </div>

        <!-- Шаг 3: Закладные -->
        <div id="step3" class="step">
            <div class="card">
                <h2>🔩 Закладные</h2>
                <div id="zaklList"></div>
                <button onclick="addZakl()">➕ Добавить закладную</button>
                <button onclick="prevStep()">← Назад</button>
                <button class="btn-success" onclick="nextStep()">Далее →</button>
            </div>
        </div>

        <!-- Шаг 4: Свет -->
        <div id="step4" class="step">
            <div class="card">
                <h2>💡 Световое оборудование</h2>
                <div id="lightList"></div>
                <button onclick="addLight()">➕ Добавить свет</button>
                <button onclick="prevStep()">← Назад</button>
                <button class="btn-success" onclick="nextStep()">Далее →</button>
            </div>
        </div>

        <!-- Шаг 5: Доп работы -->
        <div id="step5" class="step">
            <div class="card">
                <h2>🔧 Дополнительные работы</h2>
                <div id="extraList"></div>
                <button onclick="addExtra()">➕ Добавить работу</button>
                <button onclick="prevStep()">← Назад</button>
                <button class="btn-success" onclick="nextStep()">📊 Рассчитать</button>
            </div>
        </div>

        <!-- Шаг 6: Итог -->
        <div id="step6" class="step">
            <div class="card summary">
                <h2>📊 ИТОГОВЫЙ РАСЧЁТ</h2>
                <div id="summaryContent"></div>
                <button onclick="newCalculation()">🔄 Новый расчёт</button>
            </div>
        </div>
    </div>

    <script>
        // Данные приложения
        let appData = {
            rooms: [],
            profiles: [],
            zakl: [],
            light: [],
            extra: []
        };

        let currentStep = 1;

        // Цены (из вашего бота)
        const ceilingPrices = {
            'ПВХ матовый': 350,
            'ПВХ глянцевый': 380,
            'ПВХ сатиновый': 370,
            'Тканевый': 550
        };

        const profilePrices = {
            'ПВХ багет': 250,
            'Алюминиевый профиль': 450,
            'Скрытый профиль': 600
        };

        const zaklPrices = {
            'Закладная под люстру': 500,
            'Закладная под светильник': 400,
            'Усиленная закладная': 700
        };

        const lightPrices = {
            'Светильник LED 12W': 800,
            'Светильник LED 18W': 1200,
            'Трековый светильник': 1500,
            'Люстра': 2500
        };

        const extraPrices = {
            'Обход трубы': 500,
            'Установка вентиляции': 1000,
            'Дополнительный угол': 300,
            'Терморазрыв': 800
        };

        function updateProgress() {
            const percent = (currentStep / 6) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function showStep(step) {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`step${i}`).classList.remove('active');
            }
            document.getElementById(`step${step}`).classList.add('active');
            currentStep = step;
            updateProgress();
            
            if (step === 6) {
                generateSummary();
            }
        }

        function nextStep() {
            if (currentStep < 6) {
                if (currentStep === 1 && appData.rooms.length === 0) {
                    alert('Добавьте хотя бы одну комнату');
                    return;
                }
                showStep(currentStep + 1);
            } else if (currentStep === 5) {
                showStep(6);
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                showStep(currentStep - 1);
            }
        }

        function addRoom() {
            const area = prompt('Площадь комнаты (м²):');
            const perimeter = prompt('Периметр комнаты (п/м):');
            if (area && perimeter && !isNaN(area) && !isNaN(perimeter)) {
                const ceiling = prompt('Тип полотна:\n1 - ПВХ матовый\n2 - ПВХ глянцевый\n3 - ПВХ сатиновый\n4 - Тканевый');
                let ceilingType = '';
                let price = 0;
                switch(ceiling) {
                    case '1': ceilingType = 'ПВХ матовый'; price = 350; break;
                    case '2': ceilingType = 'ПВХ глянцевый'; price = 380; break;
                    case '3': ceilingType = 'ПВХ сатиновый'; price = 370; break;
                    case '4': ceilingType = 'Тканевый'; price = 550; break;
                    default: ceilingType = 'ПВХ матовый'; price = 350;
                }
                const total = parseFloat(area) * price;
                appData.rooms.push({
                    area: parseFloat(area),
                    perimeter: parseFloat(perimeter),
                    ceilingType: ceilingType,
                    price: price,
                    total: total
                });
                renderRooms();
            }
        }

        function removeRoom(index) {
            appData.rooms.splice(index, 1);
            renderRooms();
        }

        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (appData.rooms.length === 0) {
                container.innerHTML = '<p style="color: #999;">Нет добавленных комнат</p>';
                return;
            }
            container.innerHTML = appData.rooms.map((room, i) => `
                <div class="room-card">
                    <strong>Комната ${i+1}</strong><br>
                    Площадь: ${room.area} м² | Периметр: ${room.perimeter} п/м<br>
                    Полотно: ${room.ceilingType}<br>
                    Стоимость: ${room.total.toLocaleString()} ₽
                    <button class="btn-danger" onclick="removeRoom(${i})" style="padding: 5px 10px; font-size: 12px;">✖</button>
                </div>
            `).join('');
        }

        function addProfile() {
            const type = prompt('Тип профиля:\n1 - ПВХ багет (250 ₽/м)\n2 - Алюминиевый (450 ₽/м)\n3 - Скрытый (600 ₽/м)');
            const qty = prompt('Количество (п/м):');
            if (qty && !isNaN(qty)) {
                let profileType = '';
                let price = 0;
                switch(type) {
                    case '1': profileType = 'ПВХ багет'; price = 250; break;
                    case '2': profileType = 'Алюминиевый профиль'; price = 450; break;
                    case '3': profileType = 'Скрытый профиль'; price = 600; break;
                    default: profileType = 'ПВХ багет'; price = 250;
                }
                const total = parseFloat(qty) * price;
                appData.profiles.push({
                    type: profileType,
                    qty: parseFloat(qty),
                    price: price,
                    total: total
                });
                renderProfiles();
            }
        }

        function removeProfile(index) {
            appData.profiles.splice(index, 1);
            renderProfiles();
        }

        function renderProfiles() {
            const container = document.getElementById('profilesList');
            if (appData.profiles.length === 0) {
                container.innerHTML = '<p style="color: #999;">Нет добавленных профилей</p>';
                return;
            }
            container.innerHTML = appData.profiles.map((prof, i) => `
                <div class="room-card">
                    ${prof.type}<br>
                    ${prof.qty} п/м × ${prof.price} ₽ = ${prof.total.toLocaleString()} ₽
                    <button class="btn-danger" onclick="removeProfile(${i})" style="padding: 5px 10px; font-size: 12px;">✖</button>
                </div>
            `).join('');
        }

        function addZakl() {
            const type = prompt('Тип закладной:\n1 - Под люстру (500 ₽)\n2 - Под светильник (400 ₽)\n3 - Усиленная (700 ₽)');
            const qty = prompt('Количество (шт):');
            if (qty && !isNaN(qty)) {
                let zaklType = '';
                let price = 0;
                switch(type) {
                    case '1': zaklType = 'Закладная под люстру'; price = 500; break;
                    case '2': zaklType = 'Закладная под светильник'; price = 400; break;
                    case '3': zaklType = 'Усиленная закладная'; price = 700; break;
                    default: zaklType = 'Закладная под люстру'; price = 500;
                }
                const total = parseInt(qty) * price;
                appData.zakl.push({
                    type: zaklType,
                    qty: parseInt(qty),
                    price: price,
                    total: total
                });
                renderZakl();
            }
        }

        function removeZakl(index) {
            appData.zakl.splice(index, 1);
            renderZakl();
        }

        function renderZakl() {
            const container = document.getElementById('zaklList');
            if (appData.zakl.length === 0) {
                container.innerHTML = '<p style="color: #999;">Нет добавленных закладных</p>';
                return;
            }
            container.innerHTML = appData.zakl.map((item, i) => `
                <div class="room-card">
                    ${item.type}<br>
                    ${item.qty} шт × ${item.price} ₽ = ${item.total.toLocaleString()} ₽
                    <button class="btn-danger" onclick="removeZakl(${i})" style="padding: 5px 10px; font-size: 12px;">✖</button>
                </div>
            `).join('');
        }

        function addLight() {
            const type = prompt('Тип светильника:\n1 - LED 12W (800 ₽)\n2 - LED 18W (1200 ₽)\n3 - Трековый (1500 ₽)\n4 - Люстра (2500 ₽)');
            const qty = prompt('Количество (шт):');
            if (qty && !isNaN(qty)) {
                let lightType = '';
                let price = 0;
                switch(type) {
                    case '1': lightType = 'Светильник LED 12W'; price = 800; break;
                    case '2': lightType = 'Светильник LED 18W'; price = 1200; break;
                    case '3': lightType = 'Трековый светильник'; price = 1500; break;
                    case '4': lightType = 'Люстра'; price = 2500; break;
                    default: lightType = 'Светильник LED 12W'; price = 800;
                }
                const total = parseInt(qty) * price;
                appData.light.push({
                    type: lightType,
                    qty: parseInt(qty),
                    price: price,
                    total: total
                });
                renderLight();
            }
        }

        function removeLight(index) {
            appData.light.splice(index, 1);
            renderLight();
        }

        function renderLight() {
            const container = document.getElementById('lightList');
            if (appData.light.length === 0) {
                container.innerHTML = '<p style="color: #999;">Нет добавленных светильников</p>';
                return;
            }
            container.innerHTML = appData.light.map((item, i) => `
                <div class="room-card">
                    ${item.type}<br>
                    ${item.qty} шт × ${item.price} ₽ = ${item.total.toLocaleString()} ₽
                    <button class="btn-danger" onclick="removeLight(${i})" style="padding: 5px 10px; font-size: 12px;">✖</button>
                </div>
            `).join('');
        }

        function addExtra() {
            const type = prompt('Дополнительная работа:\n1 - Обход трубы (500 ₽)\n2 - Установка вентиляции (1000 ₽)\n3 - Дополнительный угол (300 ₽)\n4 - Терморазрыв (800 ₽)');
            const qty = prompt('Количество:');
            if (qty && !isNaN(qty)) {
                let extraType = '';
                let price = 0;
                switch(type) {
                    case '1': extraType = 'Обход трубы'; price = 500; break;
                    case '2': extraType = 'Установка вентиляции'; price = 1000; break;
                    case '3': extraType = 'Дополнительный угол'; price = 300; break;
                    case '4': extraType = 'Терморазрыв'; price = 800; break;
                    default: extraType = 'Обход трубы'; price = 500;
                }
                const total = parseInt(qty) * price;
                appData.extra.push({
                    type: extraType,
                    qty: parseInt(qty),
                    price: price,
                    total: total
                });
                renderExtra();
            }
        }

        function removeExtra(index) {
            appData.extra.splice(index, 1);
            renderExtra();
        }

        function renderExtra() {
            const container = document.getElementById('extraList');
            if (appData.extra.length === 0) {
                container.innerHTML = '<p style="color: #999;">Нет добавленных работ</p>';
                return;
            }
            container.innerHTML = appData.extra.map((item, i) => `
                <div class="room-card">
                    ${item.type}<br>
                    ${item.qty} × ${item.price} ₽ = ${item.total.toLocaleString()} ₽
                    <button class="btn-danger" onclick="removeExtra(${i})" style="padding: 5px 10px; font-size: 12px;">✖</button>
                </div>
            `).join('');
        }

        function generateSummary() {
            const ceilingTotal = appData.rooms.reduce((sum, r) => sum + r.total, 0);
            const profileTotal = appData.profiles.reduce((sum, p) => sum + p.total, 0);
            const zaklTotal = appData.zakl.reduce((sum, z) => sum + z.total, 0);
            const lightTotal = appData.light.reduce((sum, l) => sum + l.total, 0);
            const extraTotal = appData.extra.reduce((sum, e) => sum + e.total, 0);
            const grandTotal = ceilingTotal + profileTotal + zaklTotal + lightTotal + extraTotal;
            
            const totalPerimeter = appData.rooms.reduce((sum, r) => sum + r.perimeter, 0);
            
            document.getElementById('summaryContent').innerHTML = `
                <div style="margin: 15px 0;">
                    <strong>🏠 ПОТОЛКИ: ${ceilingTotal.toLocaleString()} ₽</strong><br>
                    Суммарный периметр: ${totalPerimeter} п/м
                </div>
                <div style="margin: 15px 0;">
                    <strong>📐 ПРОФИЛИ: ${profileTotal.toLocaleString()} ₽</strong>
                </div>
                <div style="margin: 15px 0;">
                    <strong>🔩 ЗАКЛАДНЫЕ: ${zaklTotal.toLocaleString()} ₽</strong>
                </div>
                <div style="margin: 15px 0;">
                    <strong>💡 СВЕТ: ${lightTotal.toLocaleString()} ₽</strong>
                </div>
                <div style="margin: 15px 0;">
                    <strong>🔧 ДОП. РАБОТЫ: ${extraTotal.toLocaleString()} ₽</strong>
                </div>
                
                <div class="total">
                    ИТОГО: ${grandTotal.toLocaleString()} ₽
                </div>
                
                <div class="discount">
                    Скидка 5%: ${(grandTotal * 0.95).toLocaleString()} ₽<br>
                    Скидка 10%: ${(grandTotal * 0.9).toLocaleString()} ₽<br>
                    Скидка 15%: ${(grandTotal * 0.85).toLocaleString()} ₽
                </div>
            `;
        }

        function newCalculation() {
            appData = {
                rooms: [],
                profiles: [],
                zakl: [],
                light: [],
                extra: []
            };
            renderRooms();
            renderProfiles();
            renderZakl();
            renderLight();
            renderExtra();
            showStep(1);
        }
    </script>
</body>
</html>
